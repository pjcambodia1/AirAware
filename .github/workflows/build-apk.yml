name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build AirAware APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Restore required AndroidManifest permissions
        run: |
          cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.CAMERA" />

              <uses-feature android:name="android.hardware.camera" android:required="false" />
              <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />
              <uses-feature android:name="android.hardware.location.gps" android:required="false" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="AirAware"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:label="AirAware"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode|navigation">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                  </activity>

                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>

              </application>
          </manifest>
          EOF

      - name: Restore MainActivity
        run: |
          mkdir -p android/app/src/main/java/com/airaware/app
          cat > android/app/src/main/java/com/airaware/app/MainActivity.java <<'EOF'
          package com.airaware.app;

          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {}
          EOF

      - name: Restore Android resource files
        run: |
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/xml

          cat > android/app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">AirAware</string>
              <string name="title_activity_main">AirAware</string>
              <string name="package_name">com.airaware.app</string>
              <string name="custom_url_scheme">com.airaware.app</string>
          </resources>
          EOF

          cat > android/app/src/main/res/xml/file_paths.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <external-path name="external_files" path="." />
          </paths>
          EOF

      - name: Verify Android permissions
        run: |
          echo "Checking AndroidManifest permissions..."
          grep -n "ACCESS_FINE_LOCATION" android/app/src/main/AndroidManifest.xml
          grep -n "ACCESS_COARSE_LOCATION" android/app/src/main/AndroidManifest.xml
          grep -n "CAMERA" android/app/src/main/AndroidManifest.xml
          grep -n "INTERNET" android/app/src/main/AndroidManifest.xml

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirAware-v82r5-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
